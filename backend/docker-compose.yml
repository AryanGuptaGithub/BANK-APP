version: '3.9'

services: 
  api:
    build: .
    container_name: bank_api
    ports:
      - '5000:5000'
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mongo
      - redis
    networks:
      - bank_network
    restart: unless-stopped

    mongo: 
      image: mongo:7.0
      container_name: bank_mongo
      ports:
        - '27017 : 27017'
      volumes:
        - mongo_data:/data/db
      networks:
        - bank_network
      restart: unless-stopped

    redis:
    image: redis:7.2-alpine
    container_name: bank_redis
    ports:
      - '6379:6379'
    volumes: 
      - redis_data:/data
    networks:
      - bank_network
    command: redis-server --appendonly yes
    restart: unless-stopped


    volumes:
    mongo_data:
    redis_data:

    network:
    bank_network:
    driver: bridge
     

